<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Quiz App</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <!-- ================= START SCREEN ================= -->
    <div id="startScreen" class="card glass text-center">

        <h2 class="mb-3">🚀 Advanced Quiz App</h2>

        <!-- NAME -->
        <input type="text" id="playerName" class="form-control mb-3" placeholder="Enter your name">

        <!-- STREAM -->
        <select id="stream" class="form-select mb-3">
            <option value="web">Web Development</option>
            <option value="python"> Python</option>
            <option value="iot"> IoT</option>
            <option value="dbms"> DBMS</option>
        </select>

        <!-- DIFFICULTY -->
        <select id="difficulty" class="form-select mb-3">
            <option value="easy"> Easy</option>
            <option value="medium"> Medium</option>
            <option value="hard"> Hard</option>
        </select>

        <!-- START BUTTON -->
        <button class="btn btn-glow w-100" onclick="startQuiz()">Start Quiz</button>

        <!-- LEADERBOARD -->
        <h5 class="mt-4">🏆 Leaderboard</h5>
        <ul id="leaderboardList" class="list-group mt-2"></ul>

    </div>


    <!-- ================= QUIZ SCREEN ================= -->
    <div id="quizBox" class="card glass d-none">

        <!-- Top Info -->
        <div class="d-flex justify-content-between">
            <span id="questionNo">Question 1</span>
            <span>⏱️ <span id="timer">10</span>s</span>
        </div>

        <!-- Question -->
        <h4 id="question" class="mt-3">Question will appear here</h4>

        <!-- Options -->
        <div id="options" class="mt-3"></div>

        <!-- NEXT BUTTON -->
        <button class="btn btn-glow mt-3 w-100" onclick="nextQuestion()">Next</button>

    </div>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
