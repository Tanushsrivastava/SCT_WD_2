<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Stopwatch</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

/* BACKGROUND IMAGE */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:url("bgstop.jpg");
background-size:cover;
background-position:center;

overflow:hidden;
}

/* PARTICLE EFFECT */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:0.2;
}

/* PANEL IMAGE */

.container{

width:420px;
padding:40px;

background:linear-gradient(
135deg,
rgba(15,32,39,0.85),
rgba(44,83,100,0.85)
);

border-radius:20px;

box-shadow:0 0 40px rgba(0,0,0,0.7);

text-align:center;

color:white;

backdrop-filter:blur(12px);

}

/* TITLE */

h1{
margin-bottom:25px;
letter-spacing:3px;
}

/* TIMER CIRCLE */

.timer-circle{

width:200px;
height:200px;

margin:auto;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:rgba(255,255,255,0.1);

box-shadow:
0 0 20px rgba(255,255,255,0.3),
inset 0 0 15px rgba(0,0,0,0.6);

margin-bottom:30px;

}

#display{
font-size:28px;
letter-spacing:2px;
}

/* BUTTONS */

.buttons{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

button{

padding:10px 20px;

border:none;
border-radius:10px;

font-size:15px;

cursor:pointer;

transition:0.3s;

color:white;

}

.start{
background:#27ae60;
box-shadow:0 0 10px #27ae60;
}

.pause{
background:#f39c12;
box-shadow:0 0 10px #f39c12;
}

.reset{
background:#e74c3c;
box-shadow:0 0 10px #e74c3c;
}

.lap{
background:#3498db;
box-shadow:0 0 10px #3498db;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px white;
}

button:active{
transform:scale(0.9);
}

/* LAP LIST */

#laps{

max-height:150px;
overflow-y:auto;

margin-top:20px;

text-align:left;

}

.lap-item{

padding:8px;

border-bottom:1px solid rgba(255,255,255,0.2);

animation:fade 0.4s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(-10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<h1>STOPWATCH</h1>

<div class="timer-circle">
<div id="display">00:00:00:00</div>
</div>

<div class="buttons">

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="reset" onclick="reset()">Reset</button>
<button class="lap" onclick="lap()">Lap</button>

</div>

<div id="laps"></div>

</div>

<script>

let clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3")

let ms=0
let seconds=0
let minutes=0
let hours=0

let timer=null

function updateDisplay(){

let h = hours<10 ? "0"+hours : hours
let m = minutes<10 ? "0"+minutes : minutes
let s = seconds<10 ? "0"+seconds : seconds
let milli = ms<10 ? "0"+ms : ms

document.getElementById("display").innerText =
h+":"+m+":"+s+":"+milli

}

function stopwatch(){

ms++

if(ms==100){
ms=0
seconds++
}

if(seconds==60){
seconds=0
minutes++
}

if(minutes==60){
minutes=0
hours++
}

updateDisplay()

}

function start(){

clickSound.play()

if(timer!==null) return

timer=setInterval(stopwatch,10)

}

function pause(){

clickSound.play()

clearInterval(timer)
timer=null

}

function reset(){

clickSound.play()

clearInterval(timer)

ms=0
seconds=0
minutes=0
hours=0

timer=null

updateDisplay()

document.getElementById("laps").innerHTML=""
 
}
function lap(){
clickSound.play()
let time=document.getElementById("display").innerText
let lapItem=document.createElement("div")
lapItem.className="lap-item"
lapItem.innerText="Lap : "+time
document.getElementById("laps").appendChild(lapItem)
}
</script>
</body>
</html>
